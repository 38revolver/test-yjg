services:
  backend:
    build: ./source/backend
    container_name: news-backend
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped
    networks:
      - news-net

  frontend:
    build: ./source/frontend
    container_name: news-frontend
    restart: unless-stopped
    networks:
      - news-net

  nginx:
    build: ./source/nginx
    container_name: news-nginx
    ports:
      - "32000:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - news-net

networks:
  news-net:
    driver: bridge
